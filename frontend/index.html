<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GasControl - Gestão de Refrigerantes</title>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; padding: 40px; }
    h1 { color: #38bdf8; }
    .cards { display: flex; gap: 20px; margin-top: 20px; }
    .card { background-color: #1e293b; padding: 24px; border-radius: 8px; min-width: 180px; }
    .numero { font-size: 48px; font-weight: bold; margin: 0; }
    .vermelho { border-left: 4px solid #ef4444; }
    .verde { border-left: 4px solid #22c55e; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #1e293b; }
    th { background-color: #1e293b; color: #94a3b8; font-size: 13px; text-transform: uppercase; }
    tr:hover { background-color: #1e293b; }
  </style>
</head>
<body>
  <header>
    <h1>GasControl</h1>
    <p>Gestão de Refrigerantes — Substituição R22 → R32</p>
  </header>
  <main>
    <h2>Painel de Equipamentos</h2>
    <div class="cards">
      <div class="card">
        <h3>Total de Equipamentos</h3>
        <p class="numero">50</p>
      </div>
      <div class="card vermelho">
        <h3>Usando R-22</h3>
        <p class="numero" id="total-r22">0</p>
      </div>
      <div class="card verde">
        <h3>Usando R-32</h3>
        <p class="numero" id="total-r32">0</p>
      </div>
    </div>
    <h2 style="margin-top: 40px;">Equipamentos</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Localização</th>
          <th>Gás</th>
        </tr>
      </thead>
      <tbody id="corpo-tabela"></tbody>
    </table>
  </main>
  <script>
    const equipamentos = [
      { id: "AC-001", nome: "Split Sala Reunião", local: "2º Andar", gas: "R-22" },
      { id: "AC-002", nome: "Split Diretoria", local: "3º Andar", gas: "R-32" },
      { id: "AC-003", nome: "Split RH", local: "1º Andar", gas: "R-22" },
      { id: "AC-004", nome: "Split TI", local: "1º Andar", gas: "R-22" },
      { id: "AC-005", nome: "Split Recepção", local: "Térreo", gas: "R-32" },
      { id: "AC-006", nome: "Split Financeiro", local: "2º Andar", gas: "R-22" },
      { id: "AC-007", nome: "Split Copa", local: "Térreo", gas: "R-22" },
      { id: "AC-008", nome: "Split Jurídico", local: "3º Andar", gas: "R-22" },
      { id: "AC-009", nome: "Split Corredor 01", local: "1º Andar", gas: "R-22" },
      { id: "AC-010", nome: "Split Marketing", local: "2º Andar", gas: "R-22" },
      { id: "AC-011", nome: "Split Contabilidade", local: "2º Andar", gas: "R-32" },
      { id: "AC-012", nome: "Split Almoxarifado", local: "Térreo", gas: "R-22" },
      { id: "AC-013", nome: "Split Corredor 02", local: "2º Andar", gas: "R-22" },
      { id: "AC-014", nome: "Split Compras", local: "1º Andar", gas: "R-22" },
      { id: "AC-015", nome: "Split Logística", local: "Térreo", gas: "R-32" },
      { id: "AC-016", nome: "Split Vendas 01", local: "2º Andar", gas: "R-22" },
      { id: "AC-017", nome: "Split Vendas 02", local: "2º Andar", gas: "R-22" },
      { id: "AC-018", nome: "Split Suporte", local: "1º Andar", gas: "R-32" },
      { id: "AC-019", nome: "Split Arquivo", local: "Térreo", gas: "R-22" },
      { id: "AC-020", nome: "Split Engenharia", local: "3º Andar", gas: "R-22" },
      { id: "AC-021", nome: "Split Operações", local: "1º Andar", gas: "R-32" },
      { id: "AC-022", nome: "Split Segurança", local: "Térreo", gas: "R-22" },
      { id: "AC-023", nome: "Split Qualidade", local: "2º Andar", gas: "R-22" },
      { id: "AC-024", nome: "Split Treinamento", local: "3º Andar", gas: "R-32" },
      { id: "AC-025", nome: "Split Corredor 03", local: "3º Andar", gas: "R-22" },
      { id: "AC-026", nome: "Split Projetos", local: "2º Andar", gas: "R-32" },
      { id: "AC-027", nome: "Split Administração", local: "1º Andar", gas: "R-22" },
      { id: "AC-028", nome: "Split Presidência", local: "4º Andar", gas: "R-32" },
      { id: "AC-029", nome: "Split Auditoria", local: "4º Andar", gas: "R-22" },
      { id: "AC-030", nome: "Split Conformidade", local: "4º Andar", gas: "R-32" },
      { id: "AC-031", nome: "Split Copa 02", local: "2º Andar", gas: "R-22" },
      { id: "AC-032", nome: "Split Corredor 04", local: "4º Andar", gas: "R-32" },
      { id: "AC-033", nome: "Split Estoque", local: "Térreo", gas: "R-22" },
      { id: "AC-034", nome: "Split Produção 01", local: "Térreo", gas: "R-22" },
      { id: "AC-035", nome: "Split Produção 02", local: "Térreo", gas: "R-32" },
      { id: "AC-036", nome: "Split Manutenção", local: "Térreo", gas: "R-22" },
      { id: "AC-037", nome: "Split Sala TI 02", local: "1º Andar", gas: "R-32" },
      { id: "AC-038", nome: "Split Corredor 05", local: "1º Andar", gas: "R-22" },
      { id: "AC-039", nome: "Split Sala Servidores", local: "1º Andar", gas: "R-32" },
      { id: "AC-040", nome: "Split Vestiário", local: "Térreo", gas: "R-22" },
      { id: "AC-041", nome: "Split Refeitório", local: "Térreo", gas: "R-22" },
      { id: "AC-042", nome: "Split Gerência 01", local: "3º Andar", gas: "R-32" },
      { id: "AC-043", nome: "Split Gerência 02", local: "3º Andar", gas: "R-22" },
      { id: "AC-044", nome: "Split Gerência 03", local: "3º Andar", gas: "R-32" },
      { id: "AC-045", nome: "Split Sala VIP", local: "4º Andar", gas: "R-32" },
      { id: "AC-046", nome: "Split Corredor 06", local: "3º Andar", gas: "R-22" },
      { id: "AC-047", nome: "Split Recepção 02", local: "Térreo", gas: "R-22" },
      { id: "AC-048", nome: "Split Coworking", local: "2º Andar", gas: "R-32" },
      { id: "AC-049", nome: "Split Treinamento 02", local: "2º Andar", gas: "R-22" },
      { id: "AC-050", nome: "Split Corredor 07", local: "4º Andar", gas: "R-22" },
    ];
    const corpo = document.getElementById("corpo-tabela");
    let r22 = 0, r32 = 0;
    equipamentos.forEach(function(eq) {
      if (eq.gas === "R-22") r22++;
      else r32++;
      const linha = document.createElement("tr");
      linha.innerHTML = `<td>${eq.id}</td><td>${eq.nome}</td><td>${eq.local}</td><td>${eq.gas}</td>`;
      corpo.appendChild(linha);
    });
    document.getElementById("total-r22").textContent = r22;
    document.getElementById("total-r32").textContent = r32;
  </script>
</body>
</html>
