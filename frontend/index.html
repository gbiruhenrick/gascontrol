<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GasControl - Gestão de Refrigerantes</title>
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      padding: 40px;
    }
    h1 {
      color: #38bdf8;
    }
    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background-color: #1e293b;
      padding: 24px;
      border-radius: 8px;
      min-width: 180px;
    }
    .numero {
      font-size: 48px;
      font-weight: bold;
      margin: 0;
    }
    .vermelho { border-left: 4px solid #ef4444; }
    .verde    { border-left: 4px solid #22c55e; }
  </style>
</head>
<body>
  <header>
    <h1>GasControl</h1>
    <p>Gestão de Refrigerantes — Substituição R22 → R32</p>
  </header>

  <main>
    <h2>Painel de Equipamentos</h2>
    <div class="cards">
      <div class="card">
        <h3>Total de Equipamentos</h3>
        <p class="numero">50</p>
      </div>
      <div class="card vermelho">
        <h3>Usando R-22</h3>
        <p class="numero">0</p>
      </div>
      <div class="card verde">
        <h3>Usando R-32</h3>
        <p class="numero">0</p>
      </div>
    </div>
  </main>
</body>
</html>
